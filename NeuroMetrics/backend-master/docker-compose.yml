version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alzh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alz 
      POSTGRES_PASSWORD: 123 
      POSTGRES_DB: alz_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alz -d alz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: alzh_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin 
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alz_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://alz:123@postgres:5432/alz_db
      JWT_SECRET: 1234 
      JWT_EXPIRES_IN: 7d
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: alz
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for postgres to be ready...' &&
        bunx prisma migrate deploy &&
        echo 'Migrations completed successfully!' &&
        bun run index.ts
      "

volumes:
  pgdata:
    name: alz_postgres_data
  miniodata:
    name: alz_minio_data

